<!-- ΒΑΖΟΥΜΕ WRAPPER ΓΙΑ FULL MODE -->
<div id="fullModeUI">

  <!-- COURTS -->
  <section class="panel">
    <div class="sectionTop">
      <h2>Court Selection</h2>
      <div class="miniBadges">
        <span id="currentCourtBadge" class="miniBadge">COURT1</span>
      </div>
    </div>

    <div class="courtSwitcher">
      <button class="btn btnCourt" onclick="switchCourtUI(1)">Court 1</button>
      <button class="btn btnCourt" onclick="switchCourtUI(2)">Court 2</button>
      <button class="btn btnCourt" onclick="switchCourtUI(3)">Court 3</button>
      <button class="btn btnCourt" onclick="switchCourtUI(4)">Court 4</button>
      <button class="btn btnCourt" onclick="switchCourtUI(5)">Court 5</button>
      <button class="btn btnCourt" onclick="switchCourtUI(6)">Court 6</button>
      <button class="btn btnCourt" onclick="switchCourtUI(7)">Court 7</button>
    </div>

    <button class="btn btnPrimary btnFull" onclick="toggleSimpleMode()" style="margin-top:10px;">
      Open Simple Mode
    </button>
  </section>

  <!-- MATCH INFO -->
  <section class="panel infoPanel">
    <div class="sectionTop">
      <h2>Match Info</h2>
    </div>

    <div class="fieldGrid">
      <div class="fieldBlock">
        <label>Team A Players</label>
        <input id="nameAInput">
        <button class="btn btnPrimary btnFull" onclick="updateNameA()">Update</button>
      </div>

      <div class="fieldBlock">
        <label>Team B Players</label>
        <input id="nameBInput">
        <button class="btn btnPrimary btnFull" onclick="updateNameB()">Update</button>
      </div>
    </div>
  </section>

  <!-- SCORE BUTTONS -->
  <section class="teamGrid">
    <article class="panel teamCard">
      <div id="teamANamePreview">Player1</div>
      <button class="btn btnScore" onclick="addPoint('A')">+ Point A</button>
    </article>

    <article class="panel teamCard">
      <div id="teamBNamePreview">Player2</div>
      <button class="btn btnScore" onclick="addPoint('B')">+ Point B</button>
    </article>
  </section>

</div>


<!-- SIMPLE MODE UI -->
<div id="simpleModeUI" style="display:none;">

  <section class="panel">
    <h2>Simple Mode</h2>

    <button class="btn btnPrimary btnFull" onclick="toggleSimpleMode()">
      Back To Full Mode
    </button>

    <div class="fieldGrid" style="margin-top:10px;">
      <div class="fieldBlock">
        <label>Team A Name</label>
        <input id="simpleNameA" oninput="updateNameA()">
      </div>

      <div class="fieldBlock">
        <label>Team B Name</label>
        <input id="simpleNameB" oninput="updateNameB()">
      </div>

      <div class="fieldBlock">
        <label>Score A</label>
        <input id="simpleScoreA">
      </div>

      <div class="fieldBlock">
        <label>Score B</label>
        <input id="simpleScoreB">
      </div>

      <div class="fieldBlock fullSpan">
        <button class="btn btnPrimary btnFull" onclick="updateSimpleScore()">
          Update Score
        </button>
      </div>
    </div>

  </section>

</div>
